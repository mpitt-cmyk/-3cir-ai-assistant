<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3CIR Qualification Wallet</title>
  <meta name="description" content="Verified qualification credentials from 3CIR — Australia's leading veteran-owned RPL provider.">
  <link rel="icon" type="image/jpeg" href="/public/512x512.jpg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --green: #1b8466; --green-dark: #15704f; --gold: #F5A800; --dark: #1A1A1A; --bg: #f5f5f5; --white: #ffffff; --text: #333; --muted: #777; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .wallet-container { max-width: 600px; margin: 0 auto; padding: 20px; }

    /* Credential Card */
    .credential-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card-header {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      padding: 28px 24px;
      text-align: center;
      position: relative;
    }
    .card-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 20px;
      background: var(--white);
      border-radius: 20px 20px 0 0;
    }
    .card-logo { height: 48px; margin-bottom: 12px; filter: brightness(0) invert(1); }
    .card-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
    }

    .card-body { padding: 20px 24px 28px; }

    .grad-name {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--dark);
      text-align: center;
      margin-bottom: 4px;
    }
    .verified-tag {
      text-align: center;
      margin-bottom: 24px;
    }
    .verified-tag span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #E8F5E9;
      color: var(--green);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 12px;
    }
    .verified-tag svg { width: 14px; height: 14px; fill: var(--green); }

    /* Qualification entries */
    .qual-entry {
      background: var(--bg);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      border-left: 4px solid var(--green);
    }
    .qual-name { font-weight: 700; font-size: 16px; color: var(--dark); margin-bottom: 2px; }
    .qual-code { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .qual-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .qual-detail-item { font-size: 13px; }
    .qual-detail-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .qual-detail-value { color: var(--dark); font-weight: 600; }

    /* Upsell */
    .upsell-box {
      background: #FFF8E1;
      border: 1px solid #FFE082;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 20px;
      text-align: center;
    }
    .upsell-box h3 { font-size: 15px; color: var(--dark); margin-bottom: 6px; }
    .upsell-box p { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 12px; }
    .upsell-btn {
      display: inline-block;
      background: var(--gold);
      color: var(--dark);
      padding: 10px 24px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
    }

    /* Verification */
    .verify-section {
      background: var(--white);
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }
    .verify-section h3 { font-size: 14px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .verify-ref { font-family: monospace; font-size: 18px; color: var(--dark); font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }
    .verify-note { font-size: 12px; color: var(--muted); }

    /* Share buttons */
    .share-section { text-align: center; margin-bottom: 20px; }
    .share-section h3 { font-size: 13px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .share-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: transform 0.15s;
    }
    .share-btn:hover { transform: translateY(-1px); }
    .share-btn.linkedin { background: #0077B5; color: #fff; }
    .share-btn.email { background: var(--green); color: #fff; }
    .share-btn.copy { background: var(--dark); color: #fff; }
    .share-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Footer */
    .wallet-footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: var(--muted);
    }
    .wallet-footer a { color: var(--green); }

    /* Error / Loading */
    .loading, .error-state { text-align: center; padding: 60px 20px; }
    .error-state h2 { color: var(--dark); margin-bottom: 8px; }
    .error-state p { color: var(--muted); }

    @media (max-width: 480px) {
      .qual-details { grid-template-columns: 1fr; }
      .grad-name { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="wallet-container" id="walletContainer">
    <div class="loading" id="loading">
      <p>Loading your qualification wallet...</p>
    </div>
  </div>

  <script>
    function decodeWalletData() {
      try {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('data');
        if (!encoded) return null;
        const json = atob(encoded);
        return JSON.parse(json);
      } catch (e) {
        return null;
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
      } catch (e) {
        return dateStr;
      }
    }

    // Pathway recommendations for upsell
    const pathways = {
      'Certificate II': { next: 'Certificate III', message: 'You could progress to a Certificate III to deepen your skills.' },
      'Certificate III': { next: 'Certificate IV', message: 'A Certificate IV would open up supervisory and team leader roles.' },
      'Certificate IV': { next: 'Diploma', message: 'A Diploma could open management and senior specialist positions.' },
      'Diploma': { next: 'Advanced Diploma', message: 'An Advanced Diploma positions you for executive and strategic roles.' },
      'Advanced Diploma': { next: 'Graduate Diploma', message: 'A Graduate Diploma is the pinnacle — senior leadership and C-suite pathway.' },
    };

    function render() {
      const container = document.getElementById('walletContainer');
      const data = decodeWalletData();

      if (!data || !data.name) {
        container.innerHTML = `
          <div class="error-state">
            <h2>Wallet Not Found</h2>
            <p>This qualification wallet link may have expired or is invalid.</p>
            <p style="margin-top:16px;"><a href="https://www.3cir.com" style="color:#1b8466;">Visit 3cir.com</a></p>
          </div>`;
        return;
      }

      const quals = data.qualifications || [];
      const verifyRef = data.verifyRef || ('3CIR-' + Date.now().toString(36).toUpperCase());
      const shareUrl = window.location.href;

      let qualsHtml = '';
      let highestLevel = '';
      for (const q of quals) {
        highestLevel = q.level || highestLevel;
        qualsHtml += `
          <div class="qual-entry">
            <div class="qual-name">${q.name || 'Qualification'}</div>
            <div class="qual-code">${q.code || ''}</div>
            <div class="qual-details">
              <div class="qual-detail-item">
                <div class="qual-detail-label">Level</div>
                <div class="qual-detail-value">${q.level || 'N/A'}</div>
              </div>
              <div class="qual-detail-item">
                <div class="qual-detail-label">Completed</div>
                <div class="qual-detail-value">${formatDate(q.completedDate)}</div>
              </div>
              <div class="qual-detail-item">
                <div class="qual-detail-label">Pathway</div>
                <div class="qual-detail-value">${q.pathway || 'RPL'}</div>
              </div>
              <div class="qual-detail-item">
                <div class="qual-detail-label">Issued By</div>
                <div class="qual-detail-value">Asset College (RTO 31718)</div>
              </div>
            </div>
          </div>`;
      }

      // Upsell based on highest level
      let upsellHtml = '';
      const pw = pathways[highestLevel];
      if (pw) {
        upsellHtml = `
          <div class="upsell-box">
            <h3>Ready for Your Next Qualification?</h3>
            <p>${pw.message} With your existing ${highestLevel}, you may already have credit towards a ${pw.next}.</p>
            <a href="https://www.3cir.com/services/rpl-assessment-form/" class="upsell-btn">Check Your Eligibility — Free</a>
          </div>`;
      }

      container.innerHTML = `
        <div class="credential-card">
          <div class="card-header">
            <img src="/public/512x512.jpg" class="card-logo" alt="3CIR" onerror="this.style.display='none'">
            <div class="card-badge">Verified Credentials</div>
          </div>
          <div class="card-body">
            <div class="grad-name">${data.name}</div>
            <div class="verified-tag">
              <span>
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                Verified Graduate
              </span>
            </div>
            ${qualsHtml}
            ${upsellHtml}
          </div>
        </div>

        <div class="verify-section">
          <h3>Verification Reference</h3>
          <div class="verify-ref">${verifyRef}</div>
          <div class="verify-note">Employers can verify this credential by contacting 3CIR at <a href="mailto:info@3cir.com" style="color:#1b8466;">info@3cir.com</a> with this reference number.</div>
        </div>

        <div class="share-section">
          <h3>Share Your Achievement</h3>
          <div class="share-buttons">
            <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}" target="_blank" class="share-btn linkedin">
              <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
              LinkedIn
            </a>
            <a href="mailto:?subject=${encodeURIComponent(data.name + ' — Verified Qualifications')}&body=${encodeURIComponent('View my verified qualifications from 3CIR: ' + shareUrl)}" class="share-btn email">
              <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              Email
            </a>
            <button onclick="navigator.clipboard.writeText('${shareUrl}').then(()=>{this.textContent='Copied!';setTimeout(()=>{this.innerHTML='<svg viewBox=\\'0 0 24 24\\'><path d=\\'M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z\\'/></svg> Copy Link'},2000)})" class="share-btn copy">
              <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
              Copy Link
            </button>
          </div>
        </div>

        <div class="wallet-footer">
          <p><strong>3CIR Pty Ltd</strong> (ABN 34 614 174 702)</p>
          <p>Training and assessment delivered under a third-party arrangement with <a href="https://www.assetcollege.com.au">Asset College</a> (RTO 31718).</p>
          <p style="margin-top:8px;">225+ five-star reviews · Veteran-owned · <a href="https://www.3cir.com">3cir.com</a></p>
        </div>`;
    }

    render();
  </script>
</body>
</html>
